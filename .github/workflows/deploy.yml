name: CI/CD Pipeline

on:
  push:
    branches: [master, caddy]
  pull_request:
    branches: [master, caddy]

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.5"
  VERSION: "1.0.0"
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/template-backend:${{env.VERSION}}

jobs:

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/caddy'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create production .env file
        run: |
          cat > .env << EOF
          DATABASE_USER=${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME=${{ secrets.DATABASE_NAME }}
          DATABASE_PORT=6432
          DATABASE_HOST=pgbouncer
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG=False
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          CELERY_BROKER_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379/0
          CACHE_BACKEND_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379/1
          DOMAIN=${{ secrets.DOMAIN }}
          LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/template-backend:${{env.VERSION}}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /var/www/app/deployment/server"

      - name: Upload deployment files
        run: |
          scp .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app/deployment/
          scp deployment/docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app/deployment/
          scp deployment/server/Caddyfile ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app/deployment/server/
          scp deployment/send_backup.sh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app/deployment/
          scp -r prometheus ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/app/

      - name: Deploy with Docker Compose
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'DEPLOY'
          cd /var/www/app/deployment

          # Pull latest images
          docker compose pull

          # Stop existing containers gracefully
          docker compose down --remove-orphans

          # Start new containers
          docker compose up -d

          # Wait for health checks
          sleep 30

          # Verify deployment
          docker compose ps

          # Clean up old images
          docker image prune -f
          DEPLOY

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'VERIFY'
          cd /var/www/app/deployment

          # Check if all services are running
          if docker compose ps | grep -q "unhealthy\|Exit"; then
            echo "Deployment verification failed!"
            docker compose logs --tail=50
            exit 1
          fi

          echo "Deployment successful!"
          VERIFY

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Deployment failed for ${{ github.repository }} on branch ${{ github.ref_name }}"
